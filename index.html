<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="1000+ 潮流滤镜一键生成，小红书/朋友圈都在用的神仙滤镜！韩式、美式、日系、可爱、胶片全都有" />
  <title>滤镜工坊 · 1000+神仙滤镜</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-left">
        <span class="logo-icon">✨</span>
        <h1 class="logo">滤镜工坊</h1>
        <span class="badge-count" id="badge-count">1080个滤镜</span>
      </div>
    </header>

    <div class="main-area">
      <div class="preview-area" id="preview-area">
        <div id="empty-state" class="drop-zone-overlay">
          <div class="drop-icon">📸</div>
          <h2>拖拽或点击上传照片</h2>
          <p>JPG / PNG / WebP · 最大 20MB · 本地处理不泄漏</p>
          <p class="sub-hint">还没有照片？已加载默认样片 👇</p>
        </div>
        <div class="preview-pane" id="original-pane">
          <div class="pane-label">📷 原图</div>
          <div class="pane-body">
            <canvas id="canvas-original"></canvas>
          </div>
        </div>
        <div class="center-actions">
          <button id="btn-upload" class="center-btn center-btn-upload" title="上传照片">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </button>
          <button id="btn-reset" class="center-btn center-btn-reset" title="恢复原图">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
          </button>
          <button id="btn-export" class="center-btn center-btn-export" disabled title="导出照片">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
        </div>
        <div class="preview-pane" id="filtered-pane">
          <div class="pane-label">
            <span>📸 滤镜效果</span>
            <span class="pane-info" id="pane-info">—</span>
          </div>
          <div class="pane-body">
            <canvas id="canvas-preview"></canvas>
          </div>
        </div>
      </div>

      <div class="toolbar">
        <div class="tool-group intensity-group">
          <span class="int-label">滤镜强度</span>
          <input type="range" id="intensity-slider" min="0" max="200" value="100" />
          <span id="intensity-value" class="val">100%</span>
        </div>
        <div class="tool-group">
          <button id="btn-compare" class="tool-btn active" title="切换视图">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
            对比
          </button>
          <button id="btn-share" class="tool-btn" title="复制到剪贴板">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            分享
          </button>
        </div>
      </div>

      <div class="filter-section" id="filter-section">
        <div class="filter-nav"></div>
        <div class="filter-search-row">
          <input type="text" id="filter-search" placeholder="🔍 搜索滤镜... (名称或标签)" />
          <button id="btn-favorites" class="tool-btn fav-btn">⭐ 收藏</button>
        </div>
        <div id="filter-grid" class="filter-grid"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <div id="export-modal" class="modal-overlay hidden">
      <div class="modal-card">
        <h3>💾 导出照片</h3>
        <div class="form-row">
          <label>格式</label>
          <div class="format-tabs">
            <button class="fmt-btn active" data-fmt="image/png">PNG 无损</button>
            <button class="fmt-btn" data-fmt="image/jpeg">JPEG 小体积</button>
          </div>
        </div>
        <div class="form-row" id="jpeg-quality-row">
          <label>画质 <span id="quality-label">90%</span></label>
          <input type="range" id="export-quality" min="50" max="100" value="90" />
        </div>
        <div class="modal-btns">
          <button id="btn-cancel-export" class="btn-ghost">取消</button>
          <button id="btn-confirm-export" class="btn-primary">⬇ 下载</button>
        </div>
      </div>
    </div>

    <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" hidden />
    <div id="loading" class="loading hidden"><span class="spinner"></span>处理中...</div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
