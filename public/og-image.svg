<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- 装饰圆圈 -->
  <circle cx="240" cy="189" r="150" fill="rgba(255,255,255,0.1)"/>
  <circle cx="960" cy="441" r="120" fill="rgba(255,255,255,0.1)"/>
  
  <!-- 标题 -->
  <text x="600" y="252" font-family="sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">✨ 滤镜工坊</text>
  
  <!-- 副标题 -->
  <text x="600" y="327.6" font-family="sans-serif" font-size="32" fill="rgba(255,255,255,0.9)" text-anchor="middle">1000+ 潮流滤镜 · 一键生成</text>
  
  <!-- 描述 -->
  <text x="600" y="390" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.7)" text-anchor="middle">韩式 · 美式 · 日系 · 胶片 · 可爱</text>
  
  <!-- 底部网址 -->
  <text x="600" y="567" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.5)" text-anchor="middle">https://briefsum.com</text>
</svg>